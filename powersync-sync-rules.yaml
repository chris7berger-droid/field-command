# PowerSync Sync Rules for Field Command
# Currently deployed to Development instance via PowerSync Dashboard
#
# Single bucket (all_data) — no per-user filtering yet.
# TODO: Add crew-filtered buckets (admin_all + crew_assigned) once
# per-crew job filtering is implemented in the app.

bucket_definitions:
  all_data:
    data:
      - >-
        SELECT * FROM call_log
        WHERE stage = 'Scheduled'
        OR stage = 'In Progress'
        OR stage = 'Parked'
        OR stage = 'mobilized'
        OR stage = 'in_progress'
      - SELECT * FROM proposal_wtc
      - SELECT * FROM team_members
      - SELECT * FROM job_crew
      - SELECT job_id AS id, * FROM jobs
      - SELECT * FROM time_punches
      - SELECT * FROM daily_production_reports
      - SELECT * FROM daily_log_entries
